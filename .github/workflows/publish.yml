# Publish cilicon to PyPI on every GitHub Release, via Trusted Publishing (OIDC).
# No API tokens stored anywhere — PyPI verifies the request came from this repo's
# workflow. One-time setup on PyPI: see docs/getting-started.md → "Publishing".
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:        # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi        # tie the trusted publisher to this environment
    permissions:
      id-token: write        # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
