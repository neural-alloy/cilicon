# cilicon — GitHub Action
#
# Build AND boot your code across every chip in cilicon.yml, in parallel, on
# Modal's cloud — then publish the matrix as a normal PR check (JUnit + a
# Markdown summary). cilicon is a STEP inside your CI, not a CI platform.
#
#   - uses: RyanRana/cilicon@v1
#     with:
#       config: cilicon.yml
#     env:
#       MODAL_TOKEN_ID:     ${{ secrets.MODAL_TOKEN_ID }}
#       MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
#
# See docs/github-actions.md for the full setup (Modal secrets, gating PRs).
name: cilicon
description: Build AND boot your firmware across every chip you ship to, in parallel, owning zero hardware.
author: Ryan Rana
branding:
  icon: cpu
  color: green
inputs:
  config:
    description: path to cilicon.yml (relative to your repo)
    required: false
    default: cilicon.yml
  target:
    description: run a single target by id; empty = the whole matrix
    required: false
    default: ""
  report:
    description: path to write the JUnit report
    required: false
    default: cilicon-results.xml
  artifacts:
    description: directory to pull built artifacts into
    required: false
    default: cilicon-artifacts
  telemetry:
    description: optional path to append JSONL run/target/phase events
    required: false
    default: ""
  baseline:
    description: optional baseline JSON to check for flash/RAM/boot regressions
    required: false
    default: ""
  fail-on-regression:
    description: fail the check if a size regression exceeds the threshold
    required: false
    default: "false"
  sign:
    description: "cosign-sign each green artifact (keyless OIDC — caller needs permissions: id-token: write)"
    required: false
    default: "false"
  sbom:
    description: generate a CycloneDX SBOM (syft) per green artifact
    required: false
    default: "false"
  evidence:
    description: write a signed evidence bundle (SBOM + signature + SLSA provenance) to this path
    required: false
    default: ""
  cosign-key:
    description: cosign key for signing (default is keyless — leave empty for Fulcio/Rekor)
    required: false
    default: ""
  kev-catalog:
    description: CISA KEV catalog JSON, enabling the vuln gate's 'kev' policy
    required: false
    default: ""
runs:
  using: composite
  steps:
    # Install cilicon itself from the action's own checkout — NOT the caller's
    # repo. github.action_path is where this action (the cilicon repo) lives.
    - name: Install cilicon
      shell: bash
      run: pip install "${{ github.action_path }}"
    # Only when the run asks to prove-and-sign: syft (SBOM), grype (vuln gate),
    # cosign (signature). Pinned installers; skipped entirely otherwise so a plain
    # boot-test run stays dependency-free. cilicon degrades gracefully if a tool is
    # missing, but the Action installs them so `sign: true` actually signs.
    - name: Install evidence tools (syft · grype · cosign)
      if: inputs.sign == 'true' || inputs.sbom == 'true' || inputs.evidence != ''
      shell: bash
      env:
        COSIGN_VERSION: v2.4.1
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
        sudo curl -sSfLo /usr/local/bin/cosign \
          "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
        sudo chmod +x /usr/local/bin/cosign
    - name: Build + boot the matrix
      shell: bash
      run: |
        cilicon -c "${{ inputs.config }}" run \
          ${{ inputs.target && format('--target {0}', inputs.target) || '' }} \
          --junit "${{ inputs.report }}" \
          --summary "$GITHUB_STEP_SUMMARY" \
          --artifacts "${{ inputs.artifacts }}" \
          ${{ inputs.telemetry && format('--telemetry {0}', inputs.telemetry) || '' }} \
          ${{ inputs.baseline && format('--baseline {0}', inputs.baseline) || '' }} \
          ${{ inputs.fail-on-regression == 'true' && '--fail-on-regression' || '' }} \
          ${{ inputs.sbom == 'true' && '--sbom' || '' }} \
          ${{ inputs.sign == 'true' && '--sign' || '' }} \
          ${{ inputs.cosign-key && format('--cosign-key {0}', inputs.cosign-key) || '' }} \
          ${{ inputs.evidence && format('--evidence {0}', inputs.evidence) || '' }} \
          ${{ inputs.kev-catalog && format('--kev-catalog {0}', inputs.kev-catalog) || '' }}
    - name: Upload artifacts + report + evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cilicon-results
        path: |
          ${{ inputs.artifacts }}/**
          ${{ inputs.report }}
          ${{ inputs.telemetry }}
          ${{ inputs.evidence }}
        if-no-files-found: ignore
